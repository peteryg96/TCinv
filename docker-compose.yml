version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: inventory-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-inventory}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventory-backend
    restart: unless-stopped
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      
      # Database
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-password123}@mongodb:27017/${MONGO_DB:-inventory}?authSource=admin
      
      # Security
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      
      # Shopee Configuration
      SHOPEE_ENV: ${SHOPEE_ENV:-test}
      
      # Shopee Test Environment
      SHOPEE_TEST_PARTNER_ID: ${SHOPEE_TEST_PARTNER_ID}
      SHOPEE_TEST_PARTNER_KEY: ${SHOPEE_TEST_PARTNER_KEY}
      SHOPEE_TEST_SHOP_ID: ${SHOPEE_TEST_SHOP_ID}
      SHOPEE_TEST_MERCHANT_ID: ${SHOPEE_TEST_MERCHANT_ID}
      SHOPEE_TEST_API_URL: ${SHOPEE_TEST_API_URL:-https://partner.test-stable.shopeemobile.com}
      
      # Shopee Production Environment
      SHOPEE_PROD_PARTNER_ID: ${SHOPEE_PROD_PARTNER_ID}
      SHOPEE_PROD_PARTNER_KEY: ${SHOPEE_PROD_PARTNER_KEY}
      SHOPEE_PROD_SHOP_ID: ${SHOPEE_PROD_SHOP_ID}
      SHOPEE_PROD_MERCHANT_ID: ${SHOPEE_PROD_MERCHANT_ID}
      SHOPEE_PROD_API_URL: ${SHOPEE_PROD_API_URL:-https://partner.shopeemobile.com}
      
      # Shopee OAuth & Webhook
      SHOPEE_REDIRECT_URL: ${SHOPEE_REDIRECT_URL:-http://localhost:5000/api/shopee/auth/callback}
      SHOPEE_WEBHOOK_SECRET: ${SHOPEE_WEBHOOK_SECRET}
      SHOPEE_WEBHOOK_URL: ${SHOPEE_WEBHOOK_URL:-http://localhost:5000/api/shopee/webhook}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:5173}

      # Add this line to the backend environment section
      DELETE_PASSWORD: ${DELETE_PASSWORD:-DELETE}
      
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventory-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

# Persistent volumes
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

# Network configuration
networks:
  inventory-network:
    driver: bridge
